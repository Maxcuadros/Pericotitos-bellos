name: Preview Firebase Hosting

on:
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  deploy_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Crear vista previa en Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PERICOTITOSBELLOS }}
          projectId: pericotitosbellos
          expires: 7d
